<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Spectra.bg — Преводи, легализация, печатна реклама и издателство." />
  <title>Spectra.bg</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header>
    <div class="container">
      <nav class="header-nav" aria-label="Main navigation">
        <a href="#services" data-i18n="nav.services"></a>
        <a href="#contact"  data-i18n="nav.contact"></a>
      </nav>

      <div class="lang-switcher" role="group" aria-label="Language">
        <button onclick="setLang('bg')" id="btn-bg">BG</button>
        <button onclick="setLang('en')" id="btn-en">EN</button>
        <button onclick="setLang('de')" id="btn-de">DE</button>
        <button id="btn-theme" onclick="toggleTheme()" aria-label="Toggle dark mode">☀</button>
      </div>
    </div>
  </header>

  <!-- ── Hero ────────────────────────────────────────────────── -->
  <section class="hero" aria-label="Hero">
    <div class="container">
      <div class="hero-text">
        <img id="site-logo" src="" alt="Spectra.bg" />
        <p class="hero-tagline" data-i18n="hero.tagline"></p>
      </div>
    </div>
  </section>

  <!-- ── Services ────────────────────────────────────────────── -->
  <section class="services" id="services">
    <div class="container">
      <h2 class="section-heading" data-i18n="services.heading"></h2>
      <!-- Service rows injected by JS -->
      <p class="legal-notice" data-i18n="services.legalNotice"></p>
    </div>
  </section>

  <!-- ── Contact ─────────────────────────────────────────────── -->
  <section class="contact" id="contact">
    <div class="container">
      <h2 class="section-heading" data-i18n="contact.heading"></h2>
      <div class="contact-block">

        <div class="contact-item">
          <p class="contact-label" data-i18n="contact.email"></p>
          <p class="contact-value">
            <a id="link-email" href="#"></a>
          </p>
        </div>

        <div class="contact-item">
          <p class="contact-label" data-i18n="contact.phone"></p>
          <p class="contact-value">
            <a id="link-phone" href="#"></a>
          </p>
        </div>

        <div class="contact-item">
          <p class="contact-label" data-i18n="contact.whatsapp"></p>
          <p class="contact-value">
            <a id="link-whatsapp" href="#" target="_blank" rel="noopener"></a>
          </p>
        </div>

        <div class="contact-item">
          <p class="contact-label" data-i18n="contact.signal"></p>
          <p class="contact-value">
            <a id="link-signal" href="#" target="_blank" rel="noopener"></a>
          </p>
        </div>

        <div class="contact-item">
          <p class="contact-label" data-i18n="contact.address"></p>
          <p class="contact-value">
            <a id="link-address" href="#" target="_blank" rel="noopener"></a>
          </p>
        </div>

      </div>
    </div>
  </section>

  <!-- ── Footer ──────────────────────────────────────────────── -->
  <footer>
    <div class="container">
      <div class="footer-copy">
        <span id="footer-legal-name"></span>
        <span><span data-i18n="footer.uic"></span> <span id="footer-uic"></span></span>
        <span><span data-i18n="footer.vat"></span> <span id="footer-vat"></span></span>
        <span>© <span id="footer-year"></span> <span data-i18n="footer.rights"></span></span>
      </div>
    </div>
  </footer>

  <!-- ── Theme (apply before paint to avoid flash) ─────────── -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else if (saved === 'light') {
          document.documentElement.classList.add('light');
        }
      } catch (_) {}
    })();
  </script>

  <!-- ── Data & i18n ─────────────────────────────────────────── -->
  <script src="data.js"></script>
  <script src="lang/bg.js"></script>
  <script src="lang/en.js"></script>
  <script src="lang/de.js"></script>
  <script>
    const LANGS = { bg: LANG_BG, en: LANG_EN, de: LANG_DE };

    // ── Helpers ──────────────────────────────────────────────
    function get(obj, path) {
      return path.split('.').reduce((o, k) => o && o[k], obj);
    }

    // ── Render services ──────────────────────────────────────
    function renderServices(lang) {
      const section = document.querySelector('.services .container');
      // Remove old rows
      section.querySelectorAll('.service-row').forEach(el => el.remove());
      const legalNotice = section.querySelector('.legal-notice');

      DATA.services.forEach(svc => {
        const row = document.createElement('div');
        row.className = 'service-row';
        const fmt = n => n.toFixed(2).replace('.', ',');
        const unit = svc.unit ? ` ${lang.services.units[svc.unit]}` : '';
        const priceHtml = svc.price === null
          ? `<span class="service-price">${lang.services.discretionary}</span>`
          : `<span class="service-price"><span class="service-price-label">${lang.services.from}</span> ${fmt(svc.price)} €${unit}<br><span class="service-price-bgn"><span class="service-price-label">${lang.services.from}</span> ${fmt(svc.price * DATA.eurToBgn)} ${lang.services.bgnSuffix}${unit}</span></span>`;
        row.innerHTML = `
          <span class="service-name">${lang.services.items[svc.key]}</span>
          ${priceHtml}`;
        section.insertBefore(row, legalNotice);
      });
    }

    // ── Apply language ───────────────────────────────────────
    function setLang(code) {
      const lang = LANGS[code];
      if (!lang) return;

      // Update <html lang>
      document.documentElement.lang = code;

      // Translate all data-i18n elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const val = get(lang, el.dataset.i18n);
        if (val !== undefined) el.textContent = val;
      });

      // Re-render service rows with new language
      renderServices(lang);

      // Address & legal name: Cyrillic for BG, Latin for EN/DE
      document.getElementById('link-address').textContent =
        code === 'bg' ? DATA.addressBg : DATA.addressLatin;
      document.getElementById('footer-legal-name').textContent =
        code === 'bg' ? DATA.legalNameBg : DATA.legalNameLatin;

      // Active button state
      document.querySelectorAll('.lang-switcher button').forEach(btn => {
        btn.classList.toggle('active', btn.id === 'btn-' + code);
      });

      // Persist choice
      try { localStorage.setItem('lang', code); } catch(_) {}
    }

    // ── Populate data-driven links ───────────────────────────
    function applyData() {
      document.getElementById('link-email').href        = 'mailto:' + DATA.email;
      document.getElementById('link-email').textContent = DATA.email;

      const phoneDigits = DATA.phone.replace(/\D/g, '');

      const ph = document.getElementById('link-phone');
      ph.href        = 'tel:' + DATA.phone;
      ph.textContent = DATA.phone;

      const wa = document.getElementById('link-whatsapp');
      wa.href        = 'https://wa.me/' + phoneDigits;
      wa.textContent = DATA.phone;

      const sg = document.getElementById('link-signal');
      sg.href        = 'https://signal.me/#p/' + DATA.phone;
      sg.textContent = DATA.phone;

      const addr = document.getElementById('link-address');
      addr.href = DATA.addressMapUrl;

      // Address set on init; updated per language in setLang
      document.getElementById('link-address').href = DATA.addressMapUrl;

      document.getElementById('site-logo').src = DATA.logoPath;
      document.getElementById('footer-uic').textContent  = DATA.uic;
      document.getElementById('footer-vat').textContent  = DATA.vat;
      document.getElementById('footer-year').textContent = new Date().getFullYear();
    }

    // ── Theme toggle ─────────────────────────────────────────
    function updateThemeButton() {
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('btn-theme').textContent = isDark ? '☀' : '☾';
    }

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      html.classList.toggle('light', !isDark);
      try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(_) {}
      updateThemeButton();
    }

    // ── Detect language from browser ─────────────────────────
    function detectLang() {
      const langs = navigator.languages || [navigator.language || ''];
      for (const l of langs) {
        const code = l.toLowerCase().split('-')[0];
        if (code === 'de') return 'de';
        if (code === 'bg' || code === 'mk') return 'bg';
      }
      return 'en';
    }

    // ── Init ─────────────────────────────────────────────────
    applyData();
    updateThemeButton();
    const savedLang = (() => {
      try { return localStorage.getItem('lang'); } catch(_) { return null; }
    })();
    setLang(savedLang || detectLang());
  </script>

</body>
</html>
